<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Test Photo Upload</title>
        <style>
            .preview-container {
                width: 150px;
                height: 150px;
                border: 2px solid #ddd;
                border-radius: 50%;
                overflow: hidden;
                margin: 20px;
            }
            .preview-image {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }
            .default-avatar {
                width: 100%;
                height: 100%;
                background: #007bff;
                color: white;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 3rem;
            }
        </style>
    </head>
    <body>
        <h1>Test Photo Upload Preview</h1>

        <div class="preview-container">
            <div id="imagePreview">
                <div class="default-avatar">D</div>
            </div>
        </div>

        <input
            type="file"
            id="photoInput"
            accept="image/*"
            onchange="testPreview(this)"
        />
        <button onclick="document.getElementById('photoInput').click()">
            Choose Photo
        </button>

        <div id="console"></div>

        <script>
            function log(message) {
                console.log(message);
                document.getElementById("console").innerHTML +=
                    "<div>" + message + "</div>";
            }

            function testPreview(input) {
                log("=== testPreview called ===");
                log("Input: " + input);
                log(
                    "Files length: " +
                        (input.files ? input.files.length : "no files")
                );

                if (!input.files || input.files.length === 0) {
                    log("No file selected");
                    return;
                }

                const file = input.files[0];
                const previewDiv = document.getElementById("imagePreview");

                log("File name: " + file.name);
                log("File size: " + file.size + " bytes");
                log("File type: " + file.type);
                log("Preview div: " + (previewDiv ? "found" : "not found"));

                const reader = new FileReader();

                reader.onload = function (e) {
                    log(
                        "FileReader success! Result length: " +
                            e.target.result.length
                    );
                    const imgHTML =
                        '<img src="' +
                        e.target.result +
                        '" class="preview-image" alt="Preview">';
                    previewDiv.innerHTML = imgHTML;
                    log("Image inserted successfully");
                };

                reader.onerror = function (e) {
                    log("FileReader error: " + e);
                };

                log("Starting FileReader...");
                reader.readAsDataURL(file);
            }
        </script>
    </body>
</html>
